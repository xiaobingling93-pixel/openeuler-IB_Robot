# Task: Grab a banana using a single arm
# Robot: so101
# Cameras: top, wrist

robot_interface:
  ros__parameters:
    is_mock: false
    robot_ids: [follower_arm]
    
    follower_arm:
      type: so101_follower
      port: /dev/ttyACM0
      camera_names: [top, wrist]
      cameras:
        top:
          index: 0
          width: 640
          height: 480
          fps: 30
        wrist:
          index: 2
          width: 640
          height: 480
          fps: 60
    
