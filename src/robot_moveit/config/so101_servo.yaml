# MoveIt Servo Configuration for SO101 Robot Arm

# Basic configuration
use_gazebo: false # Set to true if running in Gazebo
command_in_type: "unitless" # Controls whether twist input is unitless (normalized) or m/s & rad/s

# Scale factors
scale:
  linear: 1.0 # Max linear speed (m/s) if unitless, or scale factor
  rotational: 1.0 # Max angular speed (rad/s) if unitless, or scale factor
  joint: 1.0 # Scale for joint jogging (if used)

# Frames and Group
move_group_name: "arm" # Group defined in SRDF
planning_frame: "base" # Frame relative to which commands are expressed
ee_frame_name: "gripper" # End-effector frame to be moved
robot_link_command_frame: "base" # Frame in which the robot links move

# Topic configuration
cartesian_command_in_topic: "/servo_node/delta_twist_cmds" # Incoming twist commands from device
joint_command_in_topic: "/servo_node/delta_joint_cmds" # Incoming joint jog commands (not used here)
command_out_type: "std_msgs/Float64MultiArray" # Type of commands sent to robot controllers
command_out_topic: "/arm_position_controller/commands" # Target controller topic

# What to publish? (For Float64MultiArray, exactly one must be true)
publish_joint_positions: true
publish_joint_velocities: false
publish_joint_accelerations: false

# Timing and performance
publish_period: 0.02 # 50Hz control loop
incoming_command_timeout: 0.1 # Timeout for safety stop if commands stop

# Safety and Singularities
check_collisions: true # Enable collision checking
collision_check_rate: 10.0 # Frequency of collision checks
lower_singularity_threshold: 250.0 # Lower limit for proximity to singularities
hard_stop_singularity_threshold: 500.0 # Threshold to stop motion near singularity
joint_limit_margin: 0.01 # Buffer distance from joint limits (radians)
