# 创建一个最小测试配置
robot:
  name: test_single_arm_single_cam
  type: so101
  robot_type: so_101 

  ros2_control:
    hardware_plugin: so101_hardware/SO101SystemHardware
    port: /dev/ttyACM0
    calib_file: $(env HOME)/.calibrate/so101_follower_calibrate.json
    joint_names: ["1", "2", "3", "4", "5", "6"]
    # Reset positions (optional) - safe folded position for dog-mounted arm
    # reset_positions:
    #   "1": 0.0813
    #   "2": 3.7905
    #   "3": 7.0379
    #   "4": -0.6228
    #   "5": 2.3869
    urdf_path: $(find lerobot_description)/urdf/so101.urdf.xacro

  peripherals:
    - type: camera
      name: test
      driver: opencv
      index: 0
      width: 1280
      height: 1024
      fps: 60
      pixel_format: yuyv
      frame_id: camera_test_frame
      optical_frame_id: camera_test_optical_frame
      camera_info_url: file:///home/xqw/.ros/camera_info/test.yaml
      transform:
        parent_frame: base_link
        x: 0.0
        y: 0.0
        z: 0.5
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

  contract:
    rate_hz: 30.0
    observations:
      - key: observation.images.test
        topic: /camera/test/image_raw
        peripheral: test
      - key: observation.state
        topic: /joint_states
        selector: { names: ["1", "2", "3", "4", "5", "6"] }
    actions:
      - key: arm_action
        selector: { names: [0, 5] }  # 前5个关节
        publish:
          topic: /arm_controller/commands
          type: std_msgs/msg/Float64MultiArray
      - key: gripper_action
        selector: { names: [5, 6] }  # 第6个关节
        publish:
          topic: /gripper_controller/commands
          type: std_msgs/msg/Float64MultiArray
