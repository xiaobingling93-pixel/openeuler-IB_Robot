# SO-101 Single Arm Robot Configuration
# This configuration defines the complete hardware setup for a single SO-101 arm
# with cameras for imitation learning.

robot:
  name: so101_single_arm
  type: so101
  robot_type: so_101  # For LeRobot dataset metadata
  # Gazebo：须与 config/worlds 里 <world name="..."> 一致；create 不传 -world 时会随机取 worlds 列表第一个
  gazebo_world_name: demo
  # 在 gz 加载世界后再 spawn URDF，避免竞态（可按机器调大，如 6.0）
  gazebo_spawn_delay_sec: 5.0

  # Gazebo 窗口灰屏、实体树空但 /joint_states 正常时，日志常见：
  #   libEGL warning: egl: failed to create dri2 screen
  # 可保持下方为 true；若显卡正常、仅想开 GPU 加速，把 libgl_always_software 改为 false
  gazebo_gui:
    qt_platform: xcb
    libgl_always_software: true

  # ============================================
  # Model Library (新增)
  # ============================================
  models:
    so101_act:
      path: ./models/502000/pretrained_model
      policy_type: act
      # LeRobot motor normalization mode used during training.
      # Determines how rad ↔ LeRobot units are converted:
      #   range_m100_100 : arm [-100,+100], gripper [0,100]  (LeRobot default)
      #   degrees        : centered degrees = (ticks - mid) * 360 / 4095
      #   none           : no conversion (pass-through, units already match)
      lerobot_norm_mode: range_m100_100

  # ============================================
  # Unified joint definitions (Single Source of Truth)
  # ============================================
  joints:
    arm:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
    gripper:
      - "6"
    all: ["1", "2", "3", "4", "5", "6"]

  # ============================================
  # MoveIt configuration
  # ============================================
  moveit:
    arm_group_name: arm
    base_link: base
    ee_link: gripper
    shoulder_link: shoulder

  # Control mode management
  default_control_mode: "model_inference"

  control_modes:
    # Human teleoperation mode (direct control via leader arm/gamepad)
    teleop:
      description: "Human teleoperation mode (direct control)"
      description_cn: "人工遥操作模式（直接控制）"
      controllers:
        - joint_state_broadcaster
        - arm_position_controller
        - gripper_position_controller
      inference:
        enabled: false
        force_disable: true  # Explicitly disable inference in teleop mode
      executor:
        type: topic
        mode: teleop
        queue_size: 100
        control_frequency: 50.0

    # Model inference mode (ACT/pi0 end-to-end control)
    model_inference:
      description: "High-frequency end-to-end control mode (ACT/pi0)"
      description_cn: "高频端到端控制模式（ACT/pi0）"
      controllers:
        - joint_state_broadcaster
        - arm_position_controller
        - gripper_position_controller
      # ============================================
      # Inference configuration
      # ============================================
      inference:
        enabled: true
        # execution_mode: "distributed"
        model: so101_act
        action_server: /inference/dispatch
      # ============================================
      # Executor configuration
      # ============================================
      executor:
        type: topic  # topic | action
        mode: model_inference
        queue_size: 100
        watermark_threshold: 0
        control_frequency: 30.0

    moveit_planning:
      description: "MoveIt trajectory planning mode (VoxPoser/VLM)"
      description_cn: "MoveIt轨迹规划模式（VoxPoser/VLM）"
      controllers:
        - joint_state_broadcaster
        - arm_trajectory_controller
        - gripper_trajectory_controller
      inference:
        enabled: false  # MoveIt模式不需要推理
      executor:
        type: action
        mode: moveit_planning

  # Voice ASR is configured here and injected by robot_config/robot.launch.py.
  # The standalone voice_asr_service launch file is kept only for debugging.
  voice_asr:
    enabled: true
    active_mode: manual
    language: zh
    model_path: "src/voice_asr_service/model/sherpa-onnx-paraformer-zh-2023-09-14/model.int8.onnx"
    tokens_path: ""
    provider: cpu
    model_type: auto
    max_recording_duration: 10.0
    vad_sensitivity: 0.5
    publish_partial: true
    sample_rate: 16000
    chunk_size: 512
    buffer_seconds: 5.0
    output_topic: /voice_command
    device_index: -1

  # ros2_control configuration
  ros2_control:
    hardware_plugin: so101_hardware/SO101SystemHardware
    port: /dev/ttyACM0
    calib_file: $(env HOME)/.calibrate/so101_follower_calibrate.json
    joint_names: ["1", "2", "3", "4", "5", "6"]
    # Reset positions (optional) - uses 'rest' pose from SRDF
    reset_positions:
      "1": 0.0       # shoulder_pan:  centered
      "2": -1.5854   # shoulder_lift: ~-90° (down)
      "3": 1.5708    # elbow_flex:    ~+90° (folded)
      "4": 0.7854    # wrist_flex:    ~+45° (tilted)
      "5": 0.0       # wrist_roll:    centered
    urdf_path: $(find robot_description)/urdf/lerobot/so101/so101.urdf.xacro

    # Controllers configuration
    # Path to the controllers configuration file (YAML format)
    controllers_config: $(find so101_hardware)/config/so101_controllers.yaml

    # List of controllers to auto-start
    # These controllers will be automatically spawned when the robot launches
    controllers:
      - joint_state_broadcaster  # Publishes joint states to /joint_states
      - arm_controller           # Controls the robot arm joints
      - gripper_controller       # Controls the gripper

  # Peripheral devices (cameras, microphones, etc.)
  peripherals:
    - type: camera
      name: top
      driver: opencv
      index: 0
      width: 640
      height: 480
      fps: 30
      fovy: 70          # vertical field of view (degrees), used by MuJoCo
      pixel_format: mjpeg2rgb
      frame_id: camera_top_frame
      optical_frame_id: camera_top_optical_frame
      # Camera position relative to parent frame (base_link)
      transform:
        parent_frame: base
        x: 0.0
        y: 0.0
        z: 0.5  # 50cm above base
        roll: 0.0
        pitch: 0.0
        yaw: 0.0
      # Optional: camera calibration URL (standard ROS2 location)
      # camera_info_url: file://$(env HOME)/.ros/camera_info/top_camera.yaml

    - type: camera
      name: wrist
      driver: opencv
      index: 2
      width: 640
      height: 480
      fps: 60
      fovy: 60          # vertical field of view (degrees), used by MuJoCo
      pixel_format: mjpeg2rgb
      frame_id: camera_wrist_frame
      optical_frame_id: camera_wrist_optical_frame
      # Camera position relative to parent frame
      transform:
        parent_frame: wrist
        x: 0.0
        y: 0.0
        z: 0.0
        roll: 0.0
        pitch: 0.0
        yaw: 0.0
      # camera_info_url: file://$(env HOME)/.ros/camera_info/wrist_camera.yaml

    - type: camera
      name: front
      driver: realsense
      serial_number: ""  # Optional: specific serial number
      width: 640
      height: 480
      fps: 30
      fovy: 60          # vertical field of view (degrees), used by MuJoCo
      pixel_format: bgr8
      enable_pointcloud: false
      align_depth: true
      frame_id: camera_front_link
      optical_frame_id: camera_front_optical_frame
      # Camera position relative to base_link
      transform:
        parent_frame: base
        x: 0.1
        y: 0.0
        z: 0.2
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

  # ============================================
  # Simulation Configuration
  # ============================================
  simulation:
    platform: gazebo        # "gazebo" | "mujoco"
    scene: pick_banana      # null = 不加载场景；pick_banana = 香蕉抓取场景
    sim_models_pkg: sim_models

  # IB-Robot contract integration
  contract:
    base_contract: $(find robot_config)/config/contracts/act_grab_pan.yaml
    rate_hz: 20
    max_duration_s: 90.0

    observations:
      - key: observation.images.front
        topic: /camera/front/image_raw
        type: sensor_msgs/msg/Image
        peripheral: front
        image:
          resize: [480, 640]
        align:
          strategy: hold
          stamp: header
          tol_ms: 1500
        qos:
          reliability: best_effort
          history: keep_last
          depth: 10

      - key: observation.images.top
        topic: /camera/top/image_raw
        type: sensor_msgs/msg/Image
        peripheral: top  # References camera 'top' from peripherals above
        image:
          resize: [480, 640]  # height, width for LeRobot
        align:
          strategy: hold
          stamp: header
          tol_ms: 1500
        qos:
          reliability: best_effort
          history: keep_last
          depth: 10

      - key: observation.images.wrist
        topic: /camera/wrist/image_raw
        type: sensor_msgs/msg/Image
        peripheral: wrist  # References camera 'wrist' from peripherals above
        image:
          resize: [480, 640]
        align:
          strategy: hold
          stamp: header
          tol_ms: 1500
        qos:
          reliability: best_effort
          history: keep_last
          depth: 10

      - key: observation.state
        topic: /joint_states
        type: sensor_msgs/msg/JointState
        selector: { names: ["position.1", "position.2", "position.3", "position.4", "position.5", "position.6"] }
        align:
          strategy: hold
          stamp: header
          tol_ms: 1500
        qos:
          reliability: best_effort
          history: keep_last
          depth: 50

    actions:
      # Arm joints (1-5) - uses same key "action" for consolidation
      - key: action
        selector:
          names:
            - "action.0"
            - "action.1"
            - "action.2"
            - "action.3"
            - "action.4"
        publish:
          topic: /arm_position_controller/commands
          type: std_msgs/msg/Float64MultiArray
          layout: flat
          qos:
            reliability: best_effort
            history: keep_last
            depth: 10
          strategy:
            mode: nearest
            tolerance_ms: 500
        safety_behavior: hold

      # Gripper joint (6) - uses same key "action" for consolidation
      - key: action
        selector:
          names:
            - "action.5"
        publish:
          topic: /gripper_position_controller/commands
          type: std_msgs/msg/Float64MultiArray
          layout: flat
          qos:
            reliability: best_effort
            history: keep_last
            depth: 10
          strategy:
            mode: nearest
            tolerance_ms: 500
        safety_behavior: hold

  # ============================================
  # Teleoperation Configuration (for human teleop mode)
  # ============================================
  teleoperation:
    enabled: true
    active_device: "so101_leader" # You can switch between "so101_leader" and "xbox_controller" and "phone_teleop"
    devices:
      - name: "so101_leader"
        type: "leader_arm"
        port: "/dev/ttyACM1"
        calib_file: "$(env HOME)/.calibrate/so101_leader_calibrate.json"
      - name: "phone_teleop"
        type: "phone"
        control_frequency: 30.0
        phone_config:
          phone_os: "android" # android/ios
          camera_offset: [0.0, -0.02, 0.04]
          end_effector_step_sizes:
            x: 1.5
            y: 1.5
            z: 1.5
          end_effector_bounds:
            min: [-0.5, -0.5, 0.0]
            max: [0.5, 0.5, 0.5]
          max_ee_step_m: 0.1
          gripper_speed_factor: 20.0
          gripper_range: [0.0, 1.0]
        ee_frame_name: "gripper"
      - name: "xbox_controller"
        type: "xbox_controller"
        input_device: "/dev/input/js0"
        default_mode: "joint"
        mapping_config: "xbox_mapping"
        servo_config: "so101_servo"
        control_params:
          deadzone: 0.1
          joint_velocity_gain: 1.5
          cartesian_linear_speed: 1.0
          cartesian_angular_speed: 1.0
          long_press_duration: 0.5
    safety:
      joint_limits:
        "1": {"min": -2.0693, "max": 2.0709}
        "2": {"min": -1.92, "max": 1.92}
        "3": {"min": -1.6813, "max": 1.6828}
        "4": {"min": -1.65806, "max": 1.65806}
        "5": {"min": -2.9115, "max": 2.9115}
        "6": {"min": 0.0, "max": 1.0}

  # ============================================
  # Recording Configuration
  # ============================================
  recording:
    bag_base_dir: "~/rosbag/episodes"
    storage: mcap
