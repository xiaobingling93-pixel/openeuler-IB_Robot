[tool.ruff]
line-length = 100

target-version = "py310"

[tool.ruff.lint]
# 启用规则: 
# E/W (pycodestyle), F (Pyflakes), I (isort), B (flake8-bugbear)
# UP (pyupgrade - 自动升级旧语法)
select = ["E", "W", "F", "I", "B", "UP"]
ignore = ["B905"]


[tool.pylint.main]
py-version = "3.10"

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "raw-checker-failed",
    "bad-inline-option",
    "file-ignored",
    "suppressed-message",
    "useless-suppression",
    "deprecated-pragma",
    "use-symbolic-message-instead",
    "import-error",
    
    # --- 格式化与风格 (交由 Ruff/Black 处理) ---
    "line-too-long",             # C0301: Ruff 会处理行长
    "trailing-whitespace",       # C0303: Ruff 会自动修剪
    "missing-final-newline",     # C0304: Ruff 会自动添加
    "wrong-import-order",        # C0411: Ruff (isort) 会排序
    "ungrouped-imports",         # C0412: Ruff 会处理
    "wrong-import-position",     # C0413: Ruff 会处理
    "invalid-name",              # C0103: 命名规范 (Ruff 也能查，且 Pylint 太严格)

    # --- 重复功能 (Ruff 已经覆盖) ---
    "unused-import",             # W0611: Ruff 查得更快
    "unused-variable",           # W0612: Ruff 查得更快
]

[tool.pylint.design]
max-args = 7  
max-attributes = 10        